<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <title>Login Page</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="max-w-[520px] max-h-[743px] mx-auto">
  <header class="max-w-[456px] text-center my-8 mx-auto">
    <img src="./assets/github-logo.png" class="mb-6 mx-auto">
    <h2 class="text-[24px] font-semibold text-[#1F2937]">GitHub Issues <br>Tracker</h2>
    <p class="text-[#64748B]">Sign in to manage your issues</p>
  </header>

  <section class="max-w-[456px] mx-auto space-y-2 mb-8">
    <div class="space-y-1">
    <label for="" class="text-[18px] font-medium text-[#1F2937]">Username</label>
    <input id="input-user" type="text" class="w-full h-12 border-[#E4E4E7] rounded-2xl" placeholder="Enter Username" required>
    <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
    </div>
    <div class="space-y-1">
    <label for="" class="text-[18px] font-medium text-[#1F2937]">Password</label>
    <input id="input-pass" type="text" class="w-full h-12 border-[#E4E4E7] rounded-2xl" placeholder="Enter Password" required>
    <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>
    </div>
    <button id="login-btn" class="btn btn-primary w-full rounded-2xl">Sign In</button>
  </section>
  <section class="max-w-[456px] mx-auto">
    <div class="flex justify-between items-center">
      <hr class="border-[#E4E4E7] w-[205px]">
      <p>OR</p>
      <hr class="border-[#E4E4E7] w-[205px]">
    </div>
  </section>
  <section class="max-w-[456px] mx-auto mt-6">
    <p class="text-[#64748B] text-center">Demo Credentials:</p>
    <div class="w-full h-[90px] bg-[#F8FAFC] flex justify-center items-center flex-col">
      <h3 class="font-semibold text-[#1F2937]">Username: <span class="font-normal">admin</span></h3>
      <h3 class="font-semibold text-[#1F2937] ">Password: <span class="font-normal">admin123</span></h3>
    </div>
  </section>

  <script src="./machine.js"></script>
  <script src="./script.js"></script>
</body>
</html>
